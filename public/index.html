<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MaplibreBoard - Landing</title>
  <link rel="icon" href="/icon.png" />
  <link rel="shortcut icon" href="/icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 24px; }
    a.button { display:inline-block; padding:8px 12px; background:#0070f3; color:#fff; border-radius:4px; text-decoration:none; }
  </style>
</head>
<body>
  <h1>MaplibreBoard</h1>
  
  <ul>
    
    <li style="margin-top:8px"><a class="button" href="/map">Raster Map 보기</a></li>
    <li style="margin-top:8px"><a class="button" href="/admin">관리자 페이지로 이동 (Admin)</a></li>
  </ul>

  <hr />

  <h2>자바 베드락 겸용 마인크래프트 서버</h2>
  <div style="margin-bottom: 12px;">
    <span id="server-status">🔄 서버 상태 확인 중...</span>
  </div>
  <ul>
    <li>Java: pyeong.p-e.kr:25565</li>
    <li>Bedrock: pyeong.p-e.kr:19132</li>
    <li style="margin-top:8px"><a class="button" href="http://pyeong.p-e.kr:25575">맵 보기</a></li>
  </ul>

  <hr />
  
  <script>
    // 서버 상태 확인
    async function checkServerStatus() {
      try {
        const response = await fetch('/api/server-status');
        const data = await response.json();
        
        const statusElement = document.getElementById('server-status');
        
        if (data.online) {
          statusElement.innerHTML = `🟢 온라인 (${data.players.online}/${data.players.max} 명)`;
          statusElement.style.color = '#22c55e';
          statusElement.style.fontWeight = 'bold';
        } else {
          statusElement.innerHTML = '🔴 오프라인';
          statusElement.style.color = '#ef4444';
          statusElement.style.fontWeight = 'bold';
        }
      } catch (error) {
        const statusElement = document.getElementById('server-status');
        statusElement.innerHTML = '⚠️ 상태 확인 실패';
        statusElement.style.color = '#f59e0b';
      }
    }
    
    // 페이지 로드 시 서버 상태 확인
    checkServerStatus();
    
    // 30초마다 서버 상태 업데이트
    setInterval(checkServerStatus, 30000);
  </script>
</body>
</html>
